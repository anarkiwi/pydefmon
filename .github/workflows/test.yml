name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Fetch test fixtures
        run: python -m tools.fetch_fixtures

      - name: Run unittest discover
        run: python -m unittest discover -s tests -t . -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: black --check
        run: black --check --target-version py310 pydefmon tests
      - name: pylint
        run: pylint pydefmon

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload build artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  integration:
    runs-on: ubuntu-latest
    # Pins pydefmon's per-frame SID write stream against the real
    # defMON player running in asid-vice / anarkiwi/headlessvice.
    # A pass means pydefmon's DefmonPlayer matches the live binary's
    # SID writes byte-for-byte across the comparison window.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Pull asid-vice image
        run: docker pull anarkiwi/headlessvice:latest
      - name: Install package + integration extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,integration]
      - name: Fetch test fixtures (with d64)
        run: python -m tools.fetch_fixtures --keep-d64
      - name: Run live-VICE player comparison
        env:
          PYDEFMON_INTEGRATION: "1"
        run: python -m unittest tests.integration.test_player_vs_real -v
