name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Cache test fixtures (defMON release .prg + HVSC corpus tunes)
        uses: actions/cache@v4
        with:
          path: |
            build/fixtures
            build/tunecache
          key: >-
            fixtures-${{ hashFiles('tests/_support/defmon_corpus.txt',
            'tests/_support/__init__.py') }}

      - name: Run pytest (xdist + coverage)
        run: >-
          pytest -n auto --cov=pydefmon --cov-report=term-missing
          --cov-fail-under=85 tests

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: black --check
        run: black --check --target-version py311 pydefmon tests
      - name: pylint
        run: pylint pydefmon

  oracle:
    # Byte-exact comparison of DefmonPlayer's py65 render against the sidtrace
    # sidplayfp oracle over real HVSC defMON tunes. Never skipped: a failed HVSC
    # download or oracle render fails the job. HVSC tunes and oracle CSVs are
    # cached (tune bytes are copyright and never committed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Pull sidtrace oracle image
        id: image
        run: |
          docker pull anarkiwi/sidtrace:latest
          digest=$(docker inspect --format '{{index .RepoDigests 0}}' anarkiwi/sidtrace:latest)
          echo "digest=${digest##*@}" >> "$GITHUB_OUTPUT"
      - name: Cache HVSC tunes
        uses: actions/cache@v4
        with:
          path: .oracle-cache/hvsc
          key: hvsc-${{ hashFiles('tests/test_oracle_hvsc.py') }}
          restore-keys: hvsc-
      - name: Cache oracle CSVs
        uses: actions/cache@v4
        with:
          path: .oracle-cache/csv
          key: oracle-csv-${{ steps.image.outputs.digest }}-${{ hashFiles('tests/test_oracle_hvsc.py') }}
      - name: Oracle comparison (never skipped)
        run: pytest -m oracle -n auto

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload build artefacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
